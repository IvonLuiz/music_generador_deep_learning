dataset:
  raw_path: "./data/raw/backing_tracks/"
  processed_path: "./data/processed/backing_tracks_log_mel/"
  spectrogram_type: "mel"
  n_mels: 256
  min_max_values_path: "./data/processed/backing_tracks_log_mel/min_max_values/min_max_values.pkl"
  hdf5_path: "./data/processed/backing_tracks_log_mel/dataset.h5"
  sample_rate: 22050
  hop_length: 256
  frame_size: 2048
  target_time_frames: 1024

model:
  name: "jukebox_vqvae_maestro2011_time-frames-1024"
  selected_level: "bottom"  # options: "bottom", "middle", "top"
  input_channels: 1
  hidden_dim: 64
  num_embeddings: 2048 # codebook size
  embedding_dim: 64 # matching hidden_dim allows for better codebook utilization and richer representations, while still fitting in 12GB VRAM
  beta: 0.25
  ema_decay: 0.99           # Standard Jukebox/VQ-VAE EMA decay
  restart_threshold: 0.5    # Threshold for the EMAVectorQuantizer restart mechanism
  epsilon: 1e-5             # Small constant for numerical stability in EMA updates
  
  conv_type: 2
  dilation_growth_rate: 3
  channel_growth: 1
  activation: "sigmoid"

  level_profiles:
    bottom:
      levels: 3 # downsampling blocks -> 32x32 grid
      num_residual_layers: 8
    middle:
      levels: 4 # downsampling blocks -> 16x16 grid
      num_residual_layers: 4
    top:
      levels: 5 # downsampling blocks -> 8x8 grid
      num_residual_layers: 4

# Jukebox paper user levels 3, 5, 7. Here we keep levels: 3, 4, 5 because
# Jukebox compresses a massive 1D line of audio (e.g., 65,536 samples), while
# we are compressing a 2D image ($256 * 256$). If we were to apply 7 downsampling
# steps to a 256 grid (256 / 2^7), our Top level latent space would be a 2 * 2 grid.
# That is only 4 tokens, the Transformer prior wouldn't have enough sequential
# length to learn anything meaningful. So, 3, 4, 5 correctly yields sequence lengths
# of 1024, 256, 64, which perfectly mimics the Jukebox scale for our 2D data.

training:
  seed: 42
  bottom:
    batch_size: 2
    gradient_accumulation_steps: 32 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002 # TODO: change to 0.0003 since JUKEBOX uses it
    epochs: 500
    validation_split: 0.1
    early_stopping_patience: 50
    retrain: false
    pretrained_weights_path: "./models/jukebox_vq_vae/jukebox_vqvae_backing_tracks_log_mel_time-frames-1024_bottom/2026-04-11_04-40-18/model.pth"
  middle:
    batch_size: 4
    gradient_accumulation_steps: 16 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002
    epochs: 200
    validation_split: 0.1
    early_stopping_patience: 50
    retrain: false
    pretrained_weights_path: ""
  top:
    batch_size: 8
    gradient_accumulation_steps: 8 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002
    epochs: 200
    validation_split: 0.1
    early_stopping_patience: 50
    retrain: false
    pretrained_weights_path: ""
  save_dir: "./models/jukebox_vq_vae/"
  num_workers: 12
  pin_memory: true
  persist_workers: true
  prefetch_factor: 4

testing:
  specific_run_dir: null
  weights_file_choice: "best_model.pth"

# Jukebox paper uses:
# bottom: 3 downsampling blocks
# middle: 5 downsampling blocks
# top: 7 downsampling blocks
# residual blocks per block: 8, 4, 4
# dilation growth rate: 3
# codebook size: 2048
# commit weight: 0.02
# EMA gamma: 0.99
# conv channels: 32
# residual block width: 64, 32, 32
# raw audio 1D, not spectrogram 2D
