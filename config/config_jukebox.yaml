dataset:
  raw_path: "./data/raw/maestro-v3.0.0/"
  processed_path: "./data/processed/maestro_mel_spectrograms/"
  spectrogram_type: "mel"
  n_mels: 256
  min_max_values_path: "./data/processed/maestro_mel_spectrograms/min_max_values/min_max_values.pkl"
  sample_rate: 22050
  hop_length: 256
  frame_size: 2048
  target_time_frames: 1024

model:
  name: "jukebox_vqvae_full-maestro_log-mel"
  selected_level: "bottom"  # options: "bottom", "middle", "top"
  input_channels: 1
  num_embeddings: 2048 # codebook size (K)
  embedding_dim: 128 # dimension of each codebook vector (D)
  beta: 0.1 # The commitment loss forces the encoder's continuous outputs to stay close to the chosen discrete codebook
            # vectors. When beta is high (0.25), the encoder is heavily penalized for exploring. Because drums and
            # guitars have highly variable textures, the encoder needs more freedom to map these complex sounds.
  ema_decay: 0.99           # Jukebox/VQ-VAE EMA decay usually is 0.99
  restart_threshold: 0.5    # Threshold for the EMAVectorQuantizer restart mechanism
  epsilon: 1e-5             # Small constant for numerical stability in EMA updates
  
  conv_type: 2
  dilation_growth_rate: 3
  channel_growth: 1
  activation: "sigmoid"

  level_profiles:
    bottom:
      hidden_dim: 128 # encoder/decoder channel width. Is affected by channel_growth, but not dilation_growth_rate.
      levels: 3 # downsampling blocks -> 32x32 grid
      num_residual_layers: 8
    middle:
      hidden_dim: 128 # encoder/decoder channel width. Is affected by channel_growth, but not dilation_growth_rate.
      levels: 4 # downsampling blocks -> 16x16 grid
      num_residual_layers: 4
    top:
      hidden_dim: 64 # encoder/decoder channel width. Is affected by channel_growth, but not dilation_growth_rate.
      levels: 5 # downsampling blocks -> 8x8 grid
      num_residual_layers: 4

# Jukebox paper user levels 3, 5, 7. Here we keep levels: 3, 4, 5 because
# Jukebox compresses a massive 1D line of audio (e.g., 65,536 samples), while
# we are compressing a 2D image ($256 * 1024$). If we were to apply 7 downsampling
# steps to our grid, our Top level latent space would be a 2 * 8 grid (256 / 2^7) x (1024 / 2^7).
# That is only 64 tokens, the Transformer prior wouldn't have enough sequential
# length to learn anything meaningful. So, 3, 4, 5 correctly yields sequence lengths
# of 4096 (32x128), 1024 (16x64), and 256 (8x32) tokens, which better matches
# the intended Jukebox-scale sequence lengths for 2D data.

training:
  seed: 42
  bottom:
    batch_size: 4
    gradient_accumulation_steps: 32 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002 # jukebox uses 0.0003
    epochs: 50
    validation_split: 0.1
    early_stopping_patience: 10
    retrain: false
    pretrained_weights_path: ""
  middle:
    batch_size: 8
    gradient_accumulation_steps: 16 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002
    epochs: 50
    validation_split: 0.1
    early_stopping_patience: 10
    retrain: false
    pretrained_weights_path: ""
  top:
    batch_size: 16
    gradient_accumulation_steps: 8 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002
    epochs: 50
    validation_split: 0.1
    early_stopping_patience: 10
    retrain: false 
    pretrained_weights_path: ""
  save_dir: "./models/jukebox_vq_vae/"
  num_workers: 12
  pin_memory: true
  persist_workers: true
  prefetch_factor: 4

testing:
  specific_run_dir: null
  weights_file_choice: "best_model.pth"

# Jukebox paper uses:
# bottom: 3 downsampling blocks
# middle: 5 downsampling blocks
# top: 7 downsampling blocks
# residual blocks per block: 8, 4, 4
# dilation growth rate: 3
# codebook size: 2048
# commit weight: 0.02
# EMA gamma: 0.99
# conv channels: 32
# residual block width: 64, 32, 32
# raw audio 1D, not spectrogram 2D
