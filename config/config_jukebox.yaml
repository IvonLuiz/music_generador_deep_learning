dataset:
  raw_path: "./data/raw/maestro-v3.0.0/"
  processed_path: "/home/ivon/code/datasets/processed/maestro/"
  spectrogram_type: "mel"
  n_mels: 256
  min_max_values_path: "./data/processed/maestro/min_max_values/min_max_values.pkl"
  sample_rate: 22050
  hop_length: 256
  frame_size: 2048
  target_time_frames: 2048  # ≈24s; each preprocessed segment covers the full Top-level window

model:
  name: "jukebox_vqvae_maestro"
  selected_level: "bottom"  # options: "bottom", "middle", "top"
  input_channels: 1
  num_embeddings: 2048 # codebook size (K)
  embedding_dim: 128 # dimension of each codebook vector (D)
  beta: 0.1 # The commitment loss forces the encoder's continuous outputs to stay close to the chosen discrete codebook
            # vectors. When beta is high (0.25), the encoder is heavily penalized for exploring. Because drums and
            # guitars have highly variable textures, the encoder needs more freedom to map these complex sounds.
  ema_decay: 0.99           # Jukebox/VQ-VAE EMA decay usually is 0.99
  restart_threshold: 0.5    # Threshold for the EMAVectorQuantizer restart mechanism
  epsilon: 1e-5             # Small constant for numerical stability in EMA updates

  conv_type: 2
  dilation_growth_rate: 3   # Dilation increases by a factor of 3 in each successive residual block, creating an exponentially growing receptive field
  channel_growth: 1
  activation: "sigmoid"

  level_profiles:
    # encoder/decoder channel width (hidden_dim) is affected by channel_growth, but not dilation_growth_rate
    # levels are downsampling blocks
    bottom:
      # Bottom trains on short 1.5s windows to learn local texture/timbre.
      # Grid: 256/2^3=32 freq × 128/2^3=16 time = 512 tokens; block_len=32 (freq dim).
      target_time_frames: 128
      hidden_dim: 64
      levels: 3
      num_residual_layers: 8
    middle:
      # Middle trains on 6s windows to capture mid-range musical structure.
      # Grid: 256/2^4=16 freq × 512/2^4=32 time = 512 tokens; block_len=16.
      target_time_frames: 512
      hidden_dim: 64
      levels: 4
      num_residual_layers: 4
    top:
      # Top trains on full 24s windows to learn global song-level structure.
      # Grid: 256/2^5=8 freq × 2048/2^5=64 time = 512 tokens; block_len=8.
      target_time_frames: 2048
      hidden_dim: 64
      levels: 5
      num_residual_layers: 4

# Jukebox insight: equal context length (512 tokens) at every level, but each level
# "sees" a different duration of audio. Top compresses more → broader temporal context;
# Bottom compresses less → finer local resolution.
# Compression ratios: Bottom 2^3=8x, Middle 2^4=16x, Top 2^5=32x (per axis, so 2D: 64x/256x/1024x).
# Jukebox paper user levels 3, 5, 7. Here we keep levels: 3, 4, 5 because
# Jukebox compresses a massive 1D line of audio (e.g., 65,536 samples), while
# we compress a 2D spectrogram grid (e.g., 256×2048). So we need slightly less
# compression to get down to 512 tokens.

training:
  seed: 42
  bottom:
    batch_size: 64
    gradient_accumulation_steps: 4 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002 # jukebox uses 0.0003
    epochs: 100
    validation_split: 0.1
    early_stopping_patience: 10
    retrain: false
    pretrained_weights_path: ""
  middle:
    batch_size: 16
    gradient_accumulation_steps: 16 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002
    epochs: 100
    validation_split: 0.1
    early_stopping_patience: 10
    retrain: false
    pretrained_weights_path: ""
  top:
    batch_size: 8
    gradient_accumulation_steps: 32 # Effective batch size = batch_size * gradient_accumulation_steps
    learning_rate: 0.0002
    epochs: 100
    validation_split: 0.1
    early_stopping_patience: 10
    retrain: false
    pretrained_weights_path: ""
  save_dir: "./models/jukebox_vq_vae/"
  num_workers: 12
  pin_memory: true
  persist_workers: true
  prefetch_factor: 4

testing:
  specific_run_dir: null
  weights_file_choice: "best_model.pth"
