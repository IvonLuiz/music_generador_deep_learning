dataset:
  frame_size: 2048
  hdf5_path: ./data/processed/backing_tracks_log_mel/dataset.h5
  hop_length: 256
  min_max_values_path: ./data/processed/backing_tracks_log_mel/min_max_values/min_max_values.pkl
  n_mels: 256
  processed_path: ./data/processed/backing_tracks_log_mel/
  raw_path: ./data/raw/backing_tracks/
  sample_rate: 22050
  spectrogram_type: mel
  target_time_frames: 1024
model:
  inferred_grids:
    bottom:
    - 128
    - 32
    middle:
    - 64
    - 16
    top:
    - 32
    - 8
  inferred_seq_lens:
    bottom: 4096
    middle: 1024
    top: 256
  max_time_steps: 2048
  name: jukebox_backing_tracks_logmel_prior
  selected_level: top
  use_bos_token: true
priors:
  bottom_prior:
    attention_qkv_ratio: 0.25
    block_len: 32
    condition_on_top: true
    conditioner_conv_channels: 1024
    conditioner_dilation_cycle: 8
    conditioner_dilation_growth_rate: 3
    conditioner_kernel_size: 3
    conditioner_residual_block_width: 1024
    conditioner_residual_blocks: 16
    conditioner_upsample_stride: 4
    dim_feedforward: 2048
    dropout: 0.1
    max_time_steps: 2048
    model_dim: 512
    num_heads: 1
    num_layers: 36
  middle_prior:
    attention_qkv_ratio: 0.25
    block_len: 16
    conditioner_conv_channels: 1024
    conditioner_dilation_cycle: 8
    conditioner_dilation_growth_rate: 3
    conditioner_kernel_size: 3
    conditioner_residual_block_width: 1024
    conditioner_residual_blocks: 16
    conditioner_upsample_stride: 4
    dim_feedforward: 2048
    dropout: 0.1
    max_time_steps: 2048
    model_dim: 512
    num_heads: 1
    num_layers: 36
  top_prior:
    attention_qkv_ratio: 0.25
    block_len: 8
    dim_feedforward: 2048
    dropout: 0.1
    max_time_steps: 2048
    model_dim: 512
    num_heads: 8
    num_layers: 36
    use_bos_token: true
training:
  bottom_prior:
    batch_size: 1
    epochs: 200
    gradient_accumulation_steps: 32
    learning_rate: 0.0003
    pretrained_weights_path: ./models/transformer_prior/bottom_prior/latest_model.pth
    retrain: false
    weight_decay: 0.01
  early_stopping_patience: 10
  middle_prior:
    batch_size: 2
    epochs: 200
    gradient_accumulation_steps: 16
    learning_rate: 0.0003
    pretrained_weights_path: ./models/transformer_prior/middle_prior/latest_model.pth
    retrain: false
    weight_decay: 0.01
  save_dir: ./models/transformer_prior/
  top_prior:
    batch_size: 8
    epochs: 200
    gradient_accumulation_steps: 4
    learning_rate: 5.0e-05
    pretrained_weights_path: ./models/transformer_prior/jukebox_backing_tracks_logmel_prior_top_transformer_prior/2026-04-14_10-06-58/model_epoch_200.pth
    retrain: true
    weight_decay: 0.002
  validation_split: 0.0
vqvae:
  bottom_model_dir: ./models/jukebox_vq_vae/jukebox_vqvae_backing_tracks_log_mel_time-frames-1024_bottom/2026-04-12_03-18-59
  middle_model_dir: ./models/jukebox_vq_vae/jukebox_vqvae_backing_tracks_log_mel_time-frames-1024_middle/2026-04-13_09-38-42
  top_model_dir: ./models/jukebox_vq_vae/jukebox_vqvae_backing_tracks_log_mel_time-frames-1024_top/2026-04-13_02-00-45
  weights_file: best_model.pth
