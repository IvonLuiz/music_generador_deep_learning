dataset:
  frame_size: 512
  hdf5_path: ./data/processed/maestro_dataset.h5
  hop_length: 256
  min_max_values_path: ./data/processed/maestro_spectrograms_2011_time_frames_1024/min_max_values/min_max_values.pkl
  processed_path: ./data/processed/maestro_spectrograms_2011_time_frames_1024/
  raw_path: ./data/raw/maestro-v3.0.0/2011
  sample_rate: 22050
  target_time_frames: 1024
model:
  activation: sigmoid
  beta: 0.25
  channel_growth: 1
  conv_type: 2
  dilation_growth_rate: 3
  ema_decay: 0.99
  embedding_dim: 64
  epsilon: 1e-5
  hidden_dim: 64
  input_channels: 1
  level_profiles:
    bottom:
      levels: 3
      num_residual_layers: 8
    middle:
      levels: 4
      num_residual_layers: 4
    top:
      levels: 5
      num_residual_layers: 4
  name: jukebox_vqvae_maestro2011_time-frames-1024
  num_embeddings: 2048
  restart_threshold: 0.5
  selected_level: top
testing:
  specific_run_dir: null
  weights_file_choice: best_model.pth
training:
  batch_size: 8
  early_stopping_patience: 7
  epochs: 150
  learning_rate: 0.0002
  num_workers: 12
  persist_workers: true
  pin_memory: true
  prefetch_factor: 4
  pretrained_weights_path: ./models/jukebox_vq_vae/jukebox_vqvae_all_years/model.pth
  retrain: false
  save_dir: ./models/jukebox_vq_vae/
  validation_split: 0.2
